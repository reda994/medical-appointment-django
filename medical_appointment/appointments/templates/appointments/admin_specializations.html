{% extends 'appointments/base.html' %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h2>Specializations</h2>
    <a href="{% url 'admin_specialization_create' %}" class="btn btn-success">+ Add</a>
</div>
<table class="table">
    <thead class="table-dark"><tr><th>Name</th><th>Description</th><th>Actions</th></tr></thead>
    <tbody>
        {% for spec in specializations %}
        <tr>
            <td>{{ spec.name }}</td>
            <td>{{ spec.description|truncatechars:50 }}</td>
            <td>
                <a href="{% url 'admin_specialization_edit' spec.id %}" class="btn btn-sm btn-primary">Edit</a>
                <a href="{% url 'admin_specialization_delete' spec.id %}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No specializations.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
