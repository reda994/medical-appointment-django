{% extends 'appointments/base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0" style="border-radius: 20px; overflow: hidden;">
            <div class="card-header bg-white border-0 text-center pt-5 pb-0">
                <div class="d-inline-block bg-primary bg-opacity-10 text-primary rounded-circle p-3 mb-3">
                    <i class="bi bi-person-lock fs-2"></i>
                </div>
                <h3 class="fw-bold mb-1">Welcome Back</h3>
                <p class="text-muted">Please sign in to continue</p>
            </div>
            <div class="card-body p-4 p-sm-5 pt-3">
                <form method="post" id="loginForm">
                    {% csrf_token %}
                    <div class="form-floating mb-4">
                        <input type="text" name="username" id="username" class="form-control form-control-lg bg-light border-0" placeholder="Username" required autofocus>
                        <label for="username" class="text-muted">Username</label>
                    </div>
                    <div class="mb-4 position-relative">
                        <div class="form-floating">
                            <input type="password" name="password" id="password" class="form-control form-control-lg bg-light border-0 pe-5" placeholder="Password" required>
                            <label for="password" class="text-muted">Password</label>
                        </div>
                        <button type="button" class="btn border-0 position-absolute top-50 end-0 translate-middle-y me-2 text-muted" id="togglePassword" style="background: none; box-shadow: none;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-semibold shadow-sm mb-3">Login</button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted mb-0">Don't have an account? <a href="{% url 'register' %}" class="text-primary fw-semibold text-decoration-none">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Toggle password visibility
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    toggleBtn.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.innerHTML = type === 'password' ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
    });
</script>
{% endblock %}
