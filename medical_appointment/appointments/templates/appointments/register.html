{% extends 'appointments/base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-7 col-lg-5">
        <div class="card shadow-lg border-0" style="border-radius: 20px; overflow: hidden;">
            <div class="card-header bg-white border-0 text-center pt-5 pb-0">
                <div class="d-inline-block bg-primary bg-opacity-10 text-primary rounded-circle p-3 mb-3">
                    <i class="bi bi-person-plus fs-2"></i>
                </div>
                <h3 class="fw-bold mb-1">Create Account</h3>
                <p class="text-muted">Join us to book or manage appointments</p>
            </div>
            <div class="card-body p-4 p-sm-5 pt-3">
                <form method="post" id="registerForm" novalidate>
                    {% csrf_token %}
                    
                    <div class="row g-3">
                        <!-- Username -->
                        <div class="col-md-6 form-floating mb-2">
                            <input type="text" name="username" id="id_username" class="form-control form-control-lg bg-light border-0" placeholder="Username" required>
                            <label for="id_username" class="text-muted ms-2">Username</label>
                        </div>

                        <!-- Email -->
                        <div class="col-md-6 form-floating mb-2">
                            <input type="email" name="email" id="id_email" class="form-control form-control-lg bg-light border-0" placeholder="Email" required>
                            <label for="id_email" class="text-muted ms-2">Email</label>
                        </div>
                    </div>

                    <!-- Role -->
                    <div class="form-floating mb-3 mt-2">
                        <select name="role" id="id_role" class="form-select form-select-lg bg-light border-0" required>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                        </select>
                        <label for="id_role" class="text-muted">I am a</label>
                    </div>

                    <!-- Specialization (only for doctors) -->
                    <div class="mb-3" id="specializationDiv" style="display: none;">
                        <div class="form-floating">
                            <select name="specialization" id="id_specialization" class="form-select form-select-lg bg-light border-0">
                                <option value="">---------</option>
                                {% for spec in form.fields.specialization.queryset %}
                                    <option value="{{ spec.id }}">{{ spec.name }}</option>
                                {% endfor %}
                            </select>
                            <label for="id_specialization" class="text-muted">Specialization (for doctors)</label>
                        </div>
                        <small class="text-muted ms-1"><i class="bi bi-info-circle me-1"></i>Select your medical specialization.</small>
                    </div>

                    <!-- Password -->
                    <div class="form-floating mb-3 mt-2">
                        <input type="password" name="password1" id="id_password1" class="form-control form-control-lg bg-light border-0" placeholder="Password" required>
                        <label for="id_password1" class="text-muted">Password</label>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-floating mb-4 position-relative">
                        <input type="password" name="password2" id="id_password2" class="form-control form-control-lg bg-light border-0" placeholder="Confirm Password" required>
                        <label for="id_password2" class="text-muted">Confirm Password</label>
                        <div id="passwordMatchMsg" class="form-text ms-1 mt-1 position-absolute w-100 text-end pe-2"></div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-semibold shadow-sm mb-3">Register</button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted mb-0">Already have an account? <a href="{% url 'login' %}" class="text-primary fw-semibold text-decoration-none">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Toggle specialization field based on role
    const roleSelect = document.getElementById('id_role');
    const specializationDiv = document.getElementById('specializationDiv');
    const specializationSelect = document.getElementById('id_specialization');

    function toggleSpecialization() {
        if (roleSelect.value === 'doctor') {
            specializationDiv.style.display = 'block';
            specializationSelect.required = true;
        } else {
            specializationDiv.style.display = 'none';
            specializationSelect.required = false;
            specializationSelect.value = '';
        }
    }
    roleSelect.addEventListener('change', toggleSpecialization);
    toggleSpecialization();

    // Password match check
    const password1 = document.getElementById('id_password1');
    const password2 = document.getElementById('id_password2');
    const matchMsg = document.getElementById('passwordMatchMsg');

    function checkMatch() {
        if (password1.value === password2.value && password1.value !== '') {
            matchMsg.innerHTML = '<span class="text-success">✓ Passwords match</span>';
            return true;
        } else if (password2.value !== '') {
            matchMsg.innerHTML = '<span class="text-danger">✗ Passwords do not match</span>';
            return false;
        } else {
            matchMsg.innerHTML = '';
            return false;
        }
    }
    password2.addEventListener('input', checkMatch);
    password1.addEventListener('input', checkMatch);

    // Form validation
    const form = document.getElementById('registerForm');
    form.addEventListener('submit', function(e) {
        if (!checkMatch()) {
            e.preventDefault();
            alert('Passwords do not match.');
        } else if (roleSelect.value === 'doctor' && !specializationSelect.value) {
            e.preventDefault();
            alert('Please select a specialization for doctor registration.');
        }
    });
</script>
{% endblock %}
