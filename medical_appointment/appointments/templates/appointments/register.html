{% extends 'appointments/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h3>Create Account</h3>
            </div>
            <div class="card-body">
                <form method="post" id="registerForm" novalidate>
                    {% csrf_token %}
                    
                    <!-- Username -->
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Username</label>
                        <input type="text" name="username" id="id_username" class="form-control" required>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label for="id_email" class="form-label">Email</label>
                        <input type="email" name="email" id="id_email" class="form-control" required>
                    </div>

                    <!-- Role -->
                    <div class="mb-3">
                        <label for="id_role" class="form-label">I am a</label>
                        <select name="role" id="id_role" class="form-select" required>
                            <option value="patient">Patient</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>

                    <!-- Specialization (only for doctors) -->
                    <div class="mb-3" id="specializationDiv" style="display: none;">
                        <label for="id_specialization" class="form-label">Specialization (for doctors)</label>
                        <select name="specialization" id="id_specialization" class="form-select">
                            <option value="">---------</option>
                            {% for spec in form.fields.specialization.queryset %}
                                <option value="{{ spec.id }}">{{ spec.name }}</option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Select your medical specialization.</small>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label for="id_password1" class="form-label">Password</label>
                        <input type="password" name="password1" id="id_password1" class="form-control" required>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-3">
                        <label for="id_password2" class="form-label">Confirm Password</label>
                        <input type="password" name="password2" id="id_password2" class="form-control" required>
                        <div id="passwordMatchMsg" class="form-text"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <hr>
                <p class="text-center mb-0">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    // Toggle specialization field based on role
    const roleSelect = document.getElementById('id_role');
    const specializationDiv = document.getElementById('specializationDiv');
    const specializationSelect = document.getElementById('id_specialization');

    function toggleSpecialization() {
        if (roleSelect.value === 'doctor') {
            specializationDiv.style.display = 'block';
            specializationSelect.required = true;
        } else {
            specializationDiv.style.display = 'none';
            specializationSelect.required = false;
            specializationSelect.value = '';
        }
    }
    roleSelect.addEventListener('change', toggleSpecialization);
    toggleSpecialization();

    // Password match check
    const password1 = document.getElementById('id_password1');
    const password2 = document.getElementById('id_password2');
    const matchMsg = document.getElementById('passwordMatchMsg');

    function checkMatch() {
        if (password1.value === password2.value && password1.value !== '') {
            matchMsg.innerHTML = '<span class="text-success">✓ Passwords match</span>';
            return true;
        } else if (password2.value !== '') {
            matchMsg.innerHTML = '<span class="text-danger">✗ Passwords do not match</span>';
            return false;
        } else {
            matchMsg.innerHTML = '';
            return false;
        }
    }
    password2.addEventListener('input', checkMatch);
    password1.addEventListener('input', checkMatch);

    // Form validation
    const form = document.getElementById('registerForm');
    form.addEventListener('submit', function(e) {
        if (!checkMatch()) {
            e.preventDefault();
            alert('Passwords do not match.');
        } else if (roleSelect.value === 'doctor' && !specializationSelect.value) {
            e.preventDefault();
            alert('Please select a specialization for doctor registration.');
        }
    });
</script>
{% endblock %}
